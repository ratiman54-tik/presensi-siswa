<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi Smart V4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #2563eb; --green: #10b981; --red: #ef4444; --slate: #64748b; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; margin: 0; padding: 15px; }
        .card { background: white; max-width: 480px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin: auto; }
        .tabs { display: flex; background: #f8fafc; padding: 5px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 10px; font-weight: 600; color: var(--slate); }
        .tab.active { background: white; color: var(--blue); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .panel { display: none; } .panel.active { display: block; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; transition: 0.3s; }
        .btn-blue { background: var(--blue); } .btn-green { background: var(--green); }
        .admin-box { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 15px; }
        canvas { margin-top: 20px; max-height: 220px; }
        #msg { padding: 15px; border-radius: 10px; text-align: center; display: none; margin-top: 15px; font-weight: 600; }
    </style>
</head>
<body>

<div class="card">
    <div class="tabs">
        <div id="t-siswa" class="tab active" onclick="switchTab('siswa')">Siswa</div>
        <div id="t-admin" class="tab" onclick="switchTab('admin')">Admin Panel</div>
    </div>

    <div id="p-siswa" class="panel active">
        <h2 style="margin:0; color:#1e293b">Absensi GPS</h2>
        <input type="number" id="nisn" placeholder="Nomor NISN">
        <select id="stts">
            <option value="HADIR">Hadir (Di Sekolah)</option>
            <option value="IZIN">Izin</option>
            <option value="SAKIT">Sakit</option>
        </select>
        <button class="btn-blue" onclick="prosesAbsen()">KIRIM ABSEN</button>
        <div id="msg"></div>
    </div>

    <div id="p-admin" class="panel">
        <div id="login-area">
            <input type="password" id="pass" placeholder="Password Admin">
            <button class="btn-blue" onclick="login()">LOGIN</button>
        </div>
        <div id="dash-area" style="display:none;">
            <h3 style="margin:0">Statistik Hari Ini</h3>
            <canvas id="chartPresensi"></canvas>
            <div class="admin-box">
                <label style="font-size:12px; font-weight:bold; color:var(--blue)">DOWNLOAD LAPORAN</label>
                <input type="text" id="fKls" placeholder="Filter Kelas (Kosongkan jika semua)">
                <button class="btn-green" onclick="unduh('hari')">📅 Rekap Harian</button>
                <button class="btn-green" onclick="unduh('bulan')">📊 Rekap Bulanan</button>
            </div>
            <button style="background:none; color:var(--red); font-size:12px; margin-top:15px;" onclick="location.reload()">Logout</button>
        </div>
    </div>
</div>

<script>
    const CONFIG = { lat: -7.712, lng: 109.5827, radius: 50, url: "https://script.google.com/macros/s/AKfycbzAsgMrbmCszvCr9OdnXiB-nz6PCT2h5twDCrvjbwFb6yY4rSnVgXX2AEqj6-obaH3q/exec" };
    let dataFull = []; let chartObj;

    function switchTab(t) {
        document.querySelectorAll('.tab, .panel').forEach(e => e.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        document.getElementById('p-'+t).classList.add('active');
    }

    // --- LOGIKA SISWA ---
    function prosesAbsen() {
        const nisn = document.getElementById('nisn').value;
        const st = document.getElementById('stts').value;
        const box = document.getElementById('msg');
        if(!nisn) return alert("Masukkan NISN!");

        box.style.display = "block"; box.style.background = "#f1f5f9"; box.innerHTML = "⏳ Mengecek lokasi...";

        navigator.geolocation.getCurrentPosition(p => {
            const d = hitungJarak(p.coords.latitude, p.coords.longitude, CONFIG.lat, CONFIG.lng);
            if(st === "HADIR" && d > CONFIG.radius) {
                box.style.background = "#fee2e2"; box.innerHTML = `❌ Gagal! Jarak Anda ${d.toFixed(0)}m dari sekolah.`;
            } else {
                fetch(CONFIG.url, { method: 'POST', body: JSON.stringify({ nisn, jarak: d, status: st }) })
                .then(r => r.text()).then(m => {
                    box.style.background = m.includes("Gagal") ? "#fee2e2" : "#dcfce7";
                    box.innerHTML = m;
                });
            }
        }, () => alert("Aktifkan GPS!"), { enableHighAccuracy: true });
    }

    function hitungJarak(lat1, lon1, lat2, lon2) {
        const R = 6371000; const dLat = (lat2-lat1)*Math.PI/180; const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // --- LOGIKA ADMIN ---
    function login() {
        if(document.getElementById('pass').value === "admin123") {
            document.getElementById('login-area').style.display = "none";
            document.getElementById('dash-area').style.display = "block";
            tarikData();
        } else alert("Password Salah!");
    }

    function tarikData() {
        fetch(CONFIG.url).then(r => r.json()).then(data => {
            dataFull = data;
            const today = new Date().toLocaleDateString('en-CA');
            const s = { HADIR: 0, TERLAMBAT: 0, IZIN: 0, SAKIT: 0 };
            data.slice(1).forEach(r => {
                if(new Date(r[0]).toLocaleDateString('en-CA') === today) s[r[4]] = (s[r[4]] || 0) + 1;
            });
            if(chartObj) chartObj.destroy();
            chartObj = new Chart(document.getElementById('chartPresensi'), {
                type: 'doughnut',
                data: {
                    labels: ['Hadir', 'Terlambat', 'Izin', 'Sakit'],
                    datasets: [{ data: [s.HADIR, s.TERLAMBAT, s.IZIN, s.SAKIT], backgroundColor: ['#10b981','#f59e0b','#3b82f6','#ef4444'] }]
                }
            });
        });
    }

    function unduh(tipe) {
        const filterKelas = document.getElementById('fKls').value.trim().toUpperCase();
        const now = new Date();
        
        const filtered = dataFull.filter((row, index) => {
            if(index === 0) return true; // Header
            const tgl = new Date(row[0]);
            const kls = row[3] ? row[3].toString().toUpperCase() : ""; // Kolom D
            
            const matchKelas = filterKelas === "" || kls.includes(filterKelas);
            const matchWaktu = (tipe === 'hari') ? 
                (tgl.toLocaleDateString('en-CA') === now.toLocaleDateString('en-CA')) : 
                (tgl.getMonth() === now.getMonth() && tgl.getFullYear() === now.getFullYear());
            
            return matchKelas && matchWaktu;
        });

        if(filtered.length <= 1) return alert("Data tidak ditemukan!");
        const ws = XLSX.utils.aoa_to_sheet(filtered);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Rekap");
        XLSX.writeFile(wb, `Rekap_${tipe}_${filterKelas || 'Semua'}.xlsx`);
    }
</script>
</body>
</html>
