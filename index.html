<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi Midnight Pro V5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --accent: #38bdf8; --success: #10b981; --danger: #ef4444; --input: #334155;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: var(--card); width: 100%; max-width: 450px; padding: 25px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }
        .tabs { display: flex; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 14px; margin-bottom: 25px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 10px; font-weight: 600; color: #94a3b8; transition: 0.3s; }
        .tab.active { background: var(--input); color: var(--accent); }
        .panel { display: none; } .panel.active { display: block; }
        label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        input, select { width: 100%; padding: 14px; margin: 8px 0 18px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: var(--input); color: white; font-size: 16px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; color: #0f172a; background: var(--accent); transition: 0.3s; }
        button:hover { filter: brightness(1.2); transform: translateY(-1px); }
        .btn-green { background: var(--success); color: white; margin-top: 10px; }
        #msg { padding: 15px; border-radius: 12px; text-align: center; display: none; margin-top: 15px; font-weight: 500; border: 1px solid rgba(56, 189, 248, 0.2); background: rgba(56, 189, 248, 0.05); }
        .admin-box { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 16px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.05); }
        canvas { margin: 15px 0; max-height: 200px; }
    </style>
</head>
<body>

<div class="card">
    <div class="tabs">
        <div id="t-siswa" class="tab active" onclick="switchTab('siswa')">Siswa</div>
        <div id="t-admin" class="tab" onclick="switchTab('admin')">Admin</div>
    </div>

    <div id="p-siswa" class="panel active">
        <h2 style="margin-top:0">Presensi GPS</h2>
        <label>NISN Siswa</label>
        <input type="number" id="nisn" placeholder="Masukkan NISN">
        <label>Status Kehadiran</label>
        <select id="stts">
            <option value="HADIR">Hadir (Di Sekolah)</option>
            <option value="IZIN">Izin</option>
            <option value="SAKIT">Sakit</option>
        </select>
        <button onclick="prosesAbsen()">Kirim Absen</button>
        <div id="msg"></div>
    </div>

    <div id="p-admin" class="panel">
        <div id="login-form">
            <h2>Admin Login</h2>
            <input type="password" id="pw" placeholder="Password Admin">
            <button onclick="login()">Masuk</button>
        </div>
        <div id="dash" style="display:none;">
            <label>Statistik Hari Ini</label>
            <canvas id="chart"></canvas>
            <div class="admin-box">
                <label>Filter & Rekap Laporan</label>
                <select id="fKlsSelect">
                    <option value="">-- Semua Kelas --</option>
                </select>
                <button class="btn-green" onclick="unduh('hari')">Unduh Harian</button>
                <button class="btn-green" onclick="unduh('bulan')">Unduh Bulanan</button>
            </div>
            <p style="text-align:center; color:var(--danger); cursor:pointer; font-size:12px; margin-top:20px" onclick="location.reload()">Logout</p>
        </div>
    </div>
</div>

<script>
    const CONFIG = { lat: -7.712, lng: 109.5827, radius: 50, url: "https://script.google.com/macros/s/AKfycbz90osrCdySXdo0AHGYQmfsv8AqA-7yha8cREgbnNKvCIpwEdUQA9H7_seyvCXcGXVZ/exec" };
    let rawData = []; let chartObj;

    function switchTab(t) {
        document.querySelectorAll('.tab, .panel').forEach(e => e.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        document.getElementById('p-'+t).classList.add('active');
    }

    // --- LOGIKA SISWA ---
    function prosesAbsen() {
        const nisn = document.getElementById('nisn').value;
        const st = document.getElementById('stts').value;
        const box = document.getElementById('msg');
        if(!nisn) return alert("NISN Wajib Diisi!");
        box.style.display = "block"; box.innerHTML = "⌛ Mengecek Lokasi...";

        navigator.geolocation.getCurrentPosition(p => {
            const d = hitungJarak(p.coords.latitude, p.coords.longitude, CONFIG.lat, CONFIG.lng);
            if(st === "HADIR" && d > CONFIG.radius) {
                box.innerHTML = `❌ Gagal! Jarak Anda ${d.toFixed(0)}m dari sekolah.`;
            } else {
                fetch(CONFIG.url, { method: 'POST', body: JSON.stringify({ nisn, jarak: d, status: st }) })
                .then(r => r.text()).then(m => { box.innerHTML = m; });
            }
        }, () => alert("Gagal mendapatkan lokasi. Aktifkan GPS!"), { enableHighAccuracy: true });
    }

    function hitungJarak(l1, o1, l2, o2) {
        const R = 6371000; const dL = (l2-l1)*Math.PI/180; const dO = (o2-o1)*Math.PI/180;
        const a = Math.sin(dL/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dO/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // --- LOGIKA ADMIN ---
    function login() {
        if(document.getElementById('pw').value === "admin123") {
            document.getElementById('login-form').style.display="none";
            document.getElementById('dash').style.display="block";
            fetch(CONFIG.url).then(r => r.json()).then(d => { 
                rawData = d; 
                updateChart(); 
                populateClassList(); 
            });
        } else alert("Salah!");
    }

    function populateClassList() {
        const select = document.getElementById('fKlsSelect');
        const kelasUnik = [...new Set(rawData.slice(1).map(row => row[3]))].filter(k => k).sort();
        select.innerHTML = '<option value="">-- Semua Kelas --</option>';
        kelasUnik.forEach(kls => {
            const opt = document.createElement('option');
            opt.value = kls.toString().toUpperCase();
            opt.innerHTML = kls;
            select.appendChild(opt);
        });
    }

    function updateChart() {
        const today = new Date().toLocaleDateString('en-CA');
        const s = { HADIR: 0, TERLAMBAT: 0, IZIN: 0, SAKIT: 0 };
        rawData.slice(1).forEach(r => {
            if(new Date(r[0]).toLocaleDateString('en-CA') === today) s[r[4]] = (s[r[4]] || 0) + 1;
        });
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(document.getElementById('chart'), {
            type: 'doughnut',
            data: {
                labels: ['Hadir', 'Terlambat', 'Izin', 'Sakit'],
                datasets: [{ data: [s.HADIR, s.TERLAMBAT, s.IZIN, s.SAKIT], backgroundColor: ['#10b981','#f59e0b','#3b82f6','#ef4444'], borderWidth: 0 }]
            },
            options: { plugins: { legend: { labels: { color: '#f1f5f9' } } } }
        });
    }

    function unduh(tipe) {
        const filterKelas = document.getElementById('fKlsSelect').value.toUpperCase();
        const now = new Date();
        const filtered = rawData.filter((row, index) => {
            if(index === 0) return true;
            const tgl = new Date(row[0]);
            const kelasRow = row[3] ? row[3].toString().toUpperCase() : "";
            const matchKelas = filterKelas === "" || kelasRow === filterKelas;
            const matchWaktu = (tipe === 'hari') ? 
                (tgl.toLocaleDateString('en-CA') === now.toLocaleDateString('en-CA')) : 
                (tgl.getMonth() === now.getMonth() && tgl.getFullYear() === now.getFullYear());
            return matchKelas && matchWaktu;
        });
        if(filtered.length <= 1) return alert("Data tidak ditemukan!");
        const ws = XLSX.utils.aoa_to_sheet(filtered);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Rekap");
        XLSX.writeFile(wb, `Rekap_${tipe}_${filterKelas || 'Semua'}.xlsx`);
    }
</script>
</body>
</html>
