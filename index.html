<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi Siswa Digital</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --blue: #2563eb; --green: #10b981; --red: #ef4444; --slate: #64748b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .tabs { display: flex; background: #f8fafc; padding: 5px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 10px; font-weight: 600; color: var(--slate); }
        .tab.active { background: white; color: var(--blue); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .panel { display: none; }
        .panel.active { display: block; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 20px; border: 1.5px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; font-size: 15px; }
        .btn-blue { background: var(--blue); }
        .btn-green { background: var(--green); }
        #status { padding: 15px; border-radius: 10px; text-align: center; display: none; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <div class="tabs">
        <div id="t-siswa" class="tab active" onclick="switchTab('siswa')">Siswa</div>
        <div id="t-admin" class="tab" onclick="switchTab('admin')">Admin</div>
    </div>

    <div id="p-siswa" class="panel active">
        <h2 style="margin-top:0; color:#1e293b">Absensi</h2>
        <label>NISN</label>
        <input type="number" id="nisn" placeholder="Masukkan NISN">
        <label>Status</label>
        <select id="statusAbsen">
            <option value="HADIR">Hadir (Di Sekolah)</option>
            <option value="IZIN">Izin (Berhalangan)</option>
            <option value="SAKIT">Sakit</option>
        </select>
        <button class="btn-blue" onclick="prosesAbsen()" id="btnKirim">KIRIM ABSEN</button>
        <div id="status"></div>
    </div>

    <div id="p-admin" class="panel">
        <h2 style="margin-top:0">Panel Admin</h2>
        <div id="admin-login">
            <input type="password" id="passAdmin" placeholder="Password Admin">
            <button class="btn-blue" onclick="loginAdmin()">LOGIN</button>
        </div>
        <div id="admin-menu" style="display:none; text-align: center;">
            <p style="color:var(--green)">Login Berhasil</p>
            <button class="btn-green" onclick="unduhRekap()">📥 DOWNLOAD REKAP (XLS)</button>
            <button style="margin-top:15px; background:none; color:var(--red);" onclick="location.reload()">Logout</button>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        lat: -7.712, lng: 109.5827, radius: 50,
        url: "https://script.google.com/macros/s/AKfycbwkJpfuHVJhpcv6wHHVMeFJw4DrA2_vayTOtAu8E2cvwbg_f3ryJDoW1-IGXMGPxt2I/exec" // <-- TEMPEL URL DISINI
    };

    function switchTab(t) {
        document.querySelectorAll('.tab, .panel').forEach(e => e.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        document.getElementById('p-'+t).classList.add('active');
    }

    function hitungJarak(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function prosesAbsen() {
        const nisn = document.getElementById('nisn').value;
        const status = document.getElementById('statusAbsen').value;
        const box = document.getElementById('status');
        const btn = document.getElementById('btnKirim');

        if(!nisn) return alert("Isi NISN!");
        btn.disabled = true;
        box.style.display = "block";
        box.style.background = "#f1f5f9";
        box.innerHTML = "⏳ Mengecek Lokasi...";

        navigator.geolocation.getCurrentPosition(pos => {
            const jarak = hitungJarak(pos.coords.latitude, pos.coords.longitude, CONFIG.lat, CONFIG.lng);
            
            if (status === "HADIR" && jarak > CONFIG.radius) {
                box.style.background = "#fee2e2";
                box.innerHTML = `❌ Jarak: ${jarak.toFixed(0)}m. Untuk 'Hadir' maksimal 50m.`;
                btn.disabled = false;
            } else {
                fetch(CONFIG.url, {
                    method: 'POST',
                    body: JSON.stringify({ nisn: nisn, jarak: jarak, status: status })
                })
                .then(r => r.text()).then(msg => {
                    box.style.background = msg.includes("Gagal") ? "#fee2e2" : "#dcfce7";
                    box.innerHTML = msg;
                    btn.disabled = msg.includes("Gagal") ? false : true;
                });
            }
        }, () => { 
            alert("Aktifkan GPS!"); 
            btn.disabled = false; 
        }, { enableHighAccuracy: true });
    }

    function loginAdmin() {
        if(document.getElementById('passAdmin').value === "admin123") {
            document.getElementById('admin-login').style.display = "none";
            document.getElementById('admin-menu').style.display = "block";
        } else { alert("Salah!"); }
    }

    function unduhRekap() {
        fetch(CONFIG.url).then(r => r.json()).then(json => {
            const ws = XLSX.utils.aoa_to_sheet(json);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Rekap_Presensi");
            XLSX.writeFile(wb, "Data_Absen.xlsx");
        });
    }
</script>
</body>
</html>
